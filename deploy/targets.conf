# Deploy targets for deploy-remote.sh
#
# Format:  <name> = <ssh-destination>:<remote-repo-path>
#
#   ssh-destination  anything ssh understands: user@host, or a Host alias
#                    from ~/.ssh/config. The public key must be installed in
#                    the target's authorized_keys so login is passwordless.
#   remote-repo-path absolute path of the m-hub checkout on the target.
#
# Add a second host by adding a second line.

prod = root@locationbase.dap.tuwien.ac.at:/root/m-hub
