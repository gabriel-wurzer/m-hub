# we proudly present...
name: m-hub
# Define the services for m-hub
services:
  seaweed-filer:
    image: chrislusf/seaweedfs:3.93
    command: server -ip=seaweed-filer -dir=/data -filer=true -volume.max=${SEAWEED_VOLUME_MAX:-0}
    ports:
      - "127.0.0.1:${SEAWEED_MASTER_PORT:-9333}:9333"
      - "127.0.0.1:${SEAWEED_FILER_PORT:-8888}:8888"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8888"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    volumes:
      - seaweed_data:/data

  m-hub-db:
    image: m-hub-db
    build: ./m-hub-db
    platform: ${DOCKER_PLATFORM:-}
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mhubdb
    healthcheck:
      # -h 127.0.0.1 forces a TCP probe, so dependents (gdal, backend, postgis-api)
      # only start once Postgres is accepting real network connections, not just
      # the local unix socket.
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  gdal:
    image: osgeo/gdal:alpine-small-3.6.3
    volumes:
      - ./data:/data
    depends_on:
      m-hub-db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: m-hub-db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: mhubdb
      POSTGRES_PORT: 5432
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # -overwrite makes the import idempotent: re-running drops + re-creates
    # the buildings_details / buildingblocks tables instead of appending.
    # User-owned tables (created by /docker-entrypoint-initdb.d/*.sql on first
    # init) are untouched.
    command: >
      sh -c "
        set -e;
        echo 'Importing buildings data...';
        ogr2ogr -overwrite -f PostgreSQL \"PG:host=$$POSTGRES_HOST user=$$POSTGRES_USER dbname=$$POSTGRES_DB password=$$POSTGRES_PASSWORD\" /data/mhub_wien.gpkg buildings_details -nln buildings_details -nlt PROMOTE_TO_MULTI -progress;
        echo 'Importing building blocks data...';
        ogr2ogr -overwrite -f PostgreSQL \"PG:host=$$POSTGRES_HOST user=$$POSTGRES_USER dbname=$$POSTGRES_DB password=$$POSTGRES_PASSWORD\" /data/mhub_wien.gpkg buildingblocks -nln buildingblocks -nlt PROMOTE_TO_MULTI -progress;
        echo 'Data import completed.'
      "

  m-hub-postgis-api:
    image: m-hub-postgis-api
    build: ./m-hub-postgis-api
    # Expose port 3000 from the container to the host port 3002
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      POSTGRES_CONNECTION: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@m-hub-db:5432/mhubdb
      TABLES: '["buildings_details","buildingblocks"]'
      PORT: 3000
    depends_on:
      m-hub-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const net=require('net');const s=net.connect(3000,'127.0.0.1');s.on('connect',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),2000);"
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  m-hub-backend:
    image: m-hub-backend
    build:
      context: ./m-hub-backend
    ports:
      - "127.0.0.1:1880:1880"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - SEAWEED_FILER_INTERNAL_URL=${SEAWEED_FILER_INTERNAL_URL:-http://seaweed-filer:8888}
      - SEAWEED_PUBLIC_BASE_URL=${SEAWEED_PUBLIC_BASE_URL:-http://localhost:8888}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
    # Mount host directories to container directories as volumes.
    # The named volume on /data/node_modules sits ON TOP of the bind mount and
    # gets initialised from the image's /data/node_modules on first start, so
    # node-red palette nodes (node-red-contrib-postgresql etc.) survive the
    # bind-mount shadowing. See m-hub-backend/Dockerfile.
    volumes:
      - ./m-hub-backend/data:/data
      - m-hub-backend-deps:/data/node_modules
    depends_on:
      m-hub-postgis-api:
        condition: service_healthy
      seaweed-filer:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const net=require('net');const s=net.connect(1880,'127.0.0.1');s.on('connect',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),2000);"
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  m-hub-frontend:
    image: m-hub-frontend
    build:
      context: ./m-hub-frontend
      args:
        MAPBOX_TOKEN: ${MAPBOX_TOKEN:-}
        LOGO_PATH: ${LOGO_PATH:-/assets/images/mhub_logo_grey.svg}
    # docker run -i
    stdin_open: true
    # docker run -t
    tty: true
    # Expose port 8080 from the container to the host port 8910
    ports:
      - "8910:8080"
    depends_on:
      m-hub-backend:
        condition: service_healthy
volumes:
  # declare named value
  pgdata:
  seaweed_data:
  m-hub-backend-deps:
