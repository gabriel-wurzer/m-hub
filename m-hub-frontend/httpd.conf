# busybox httpd config
# H: document root (where Angular static build lives)
H:/home/static

# SPA fallback - route unknown paths to the Angular entry point
E404:/home/static/index.html

# Reverse-proxy backend API calls so the browser stays on one origin.
# Target hostnames resolve inside the docker compose network.
P:/api/:http://m-hub-backend:1880/api/
P:/nominatim:http://m-hub-backend:1880/nominatim
P:/postgis/:http://m-hub-postgis-api:3000/
