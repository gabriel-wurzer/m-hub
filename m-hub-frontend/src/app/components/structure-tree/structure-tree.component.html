<mat-tree [dataSource]="dataSource" [treeControl]="treeControl" class="structure-tree">

  <!-- Root node: Building -->
  <mat-nested-tree-node 
    *matTreeNodeDef="let node; when: isBuildingNode" 
    matTreeNodePadding 
    class="structure-tree-node"
  >
    <div
      class="mat-tree-node structure-tree-row clickable"
      [class.active]="isSelected(node)"
      (click)="onNodeClickAllowed(node)">
      <img src="/assets/images/house_icon.svg" alt="House Icon" class="house-icon" loading="eager"/>
      <span class="building-text">
        {{ node.name }}
      </span>
    </div>
    <div role="group">
      <ng-container matTreeNodeOutlet></ng-container>
    </div>
  </mat-nested-tree-node>

  <!-- Leaf nodes: Components -->
  <mat-tree-node 
    *matTreeNodeDef="let node" 
    matTreeNodePadding
    [class.private-element]="!node.canRead"
    [class.active]="isSelected(node)"
    [matTooltip]="(!node.canRead) ? node.name + ' ist nicht öffentlich.' : ''"
    matTooltipShowDelay="300"
    (click)="onNodeClickAllowed(node)"
  >
    <span class="structure-tree-label">{{ node.name }}</span>

    <mat-icon *ngIf="!node.canRead" class="lock-icon">lock</mat-icon>
  </mat-tree-node>

</mat-tree>
