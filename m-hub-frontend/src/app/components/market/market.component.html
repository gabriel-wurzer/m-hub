<main>
  <div class="market-container" [hidden]="isUserListingsViewVisible || isMarketListingViewVisible">
    <div
      id="market"
      [class.category-active]="selectedCategory"
      [class.detail-active]="isMarketListingViewVisible">
      <ng-container *ngIf="!selectedCategory; else categoryView">
        <header class="market-header">
          <div class="headline">
            <h1>M-Hub Markt</h1>
          </div>

          <button
            *ngIf="isLoggedIn$ | async"
            mat-stroked-button
            class="my-listings-button"
            type="button"
            aria-label="Meine Inserate"
            (click)="openMyListings()">
            <mat-icon>inventory_2</mat-icon>
            Meine Inserate
          </button>
        </header>

        <mat-divider class="horizontal-divider"></mat-divider>

        <div class="market-content">
          <section class="market-section">
            <div class="section-header">
              <h2>Materialien</h2>
              <p>{{ materialGroups.length }} Materialgruppen</p>
            </div>

            <div class="card-grid">
              <mat-card
                class="market-card"
                *ngFor="let item of materialGroups; trackBy: trackByCategoryId"
                tabindex="0"
                role="button"
                (click)="openCategory(item)"
                (keydown.enter)="openCategory(item)"
                (keydown.space)="openCategory(item); $event.preventDefault()">
                <div class="card-image-shell">
                  <img
                    [src]="item.imageSrc"
                    [alt]="item.imageAlt"
                    class="card-image"
                    loading="lazy" />
                </div>

                <mat-card-content class="card-content">
                  <div class="card-header-row">
                    <h3>{{ item.title }}</h3>
                    <span *ngIf="categoryCountsLoaded" class="card-tag">{{ formatCategoryListingCount(item) }}</span>
                  </div>
                  <p class="card-description">{{ item.description }}</p>
                </mat-card-content>
              </mat-card>
            </div>
          </section>

          <mat-divider></mat-divider>

          <section class="market-section">
            <div class="section-header">
              <h2>Objekt-Kategorien</h2>
              <p>{{ objectTypes.length }} Kategorien</p>
            </div>

            <div class="card-grid">
              <mat-card
                class="market-card"
                *ngFor="let item of objectTypes; trackBy: trackByCategoryId"
                tabindex="0"
                role="button"
                (click)="openCategory(item)"
                (keydown.enter)="openCategory(item)"
                (keydown.space)="openCategory(item); $event.preventDefault()">
                <div class="card-image-shell">
                  <img
                    [src]="item.imageSrc"
                    [alt]="item.imageAlt"
                    class="card-image"
                    loading="lazy" />
                </div>

                <mat-card-content class="card-content">
                  <div class="card-header-row">
                    <h3>{{ item.title }}</h3>
                    <span *ngIf="categoryCountsLoaded" class="card-tag">{{ formatCategoryListingCount(item) }}</span>
                  </div>
                  <p class="card-description">{{ item.description }}</p>
                </mat-card-content>
              </mat-card>
            </div>
          </section>
        </div>
      </ng-container>

      <ng-template #categoryView>
        <app-market-category-view
          [category]="selectedCategory"
          [materialCategories]="materialGroups"
          [objectCategories]="objectTypes"
          [loading]="isCategoryLoading"
          [loadError]="categoryLoadError"
          [isLoggedIn]="(isLoggedIn$ | async) ?? false"
          (categorySelect)="openCategory($event)"
          (listingSelect)="openMarketListing($event)"
          (myListings)="openMyListings()"
          (back)="closeCategory()"></app-market-category-view>
      </ng-template>
    </div>
  </div>

  <app-market-listing
    *ngIf="isMarketListingViewVisible"
    [listing]="activeMarketListing"
    [loading]="isMarketListingLoading"
    [loadError]="marketListingLoadError"
    (closeMarketListing)="closeMarketListing()"
    (similarListingSelect)="openMarketListing($event)" />

  <app-user-market-listings-view
    *ngIf="isUserListingsViewVisible && !isMarketListingViewVisible"
    (closeUserListingsView)="closeMyListings()"
    (listingSelect)="openMarketListing($event)"
    (listingDeleted)="onUserListingDeleted($event)"
    (listingUpdated)="onUserListingUpdated()" />
</main>
