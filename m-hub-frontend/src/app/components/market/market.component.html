<main>
  <div class="market-container">
    <div id="market" [class.category-active]="selectedCategory">
      <ng-container *ngIf="!selectedCategory; else categoryView">
        <header class="market-header">
          <div class="headline-copy">
            <h1>M-Hub Markt</h1>
          </div>
        </header>

        <mat-divider class="horizontal-divider"></mat-divider>

        <div class="market-content">
          <section class="market-section">
            <div class="section-header">
              <h2>Materialien</h2>
              <p>{{ materialGroups.length }} Materialgruppen</p>
            </div>

            <div class="card-grid">
              <mat-card
                class="market-card"
                *ngFor="let item of materialGroups; trackBy: trackByCategoryId"
                tabindex="0"
                role="button"
                (click)="openCategory(item)"
                (keydown.enter)="openCategory(item)"
                (keydown.space)="openCategory(item); $event.preventDefault()">
                <div class="card-image-shell">
                  <img
                    [src]="item.imageSrc"
                    [alt]="item.imageAlt"
                    class="card-image"
                    loading="lazy" />
                </div>

                <mat-card-content class="card-content">
                  <div class="card-header-row">
                    <h3>{{ item.title }}</h3>
                    <span *ngIf="categoryCountsLoaded" class="card-tag">{{ formatCategoryListingCount(item) }}</span>
                  </div>
                  <p class="card-description">{{ item.description }}</p>
                </mat-card-content>
              </mat-card>
            </div>
          </section>

          <mat-divider></mat-divider>

          <section class="market-section">
            <div class="section-header">
              <h2>Objekt-Kategorien</h2>
              <p>{{ objectTypes.length }} Kategorien</p>
            </div>

            <div class="card-grid">
              <mat-card
                class="market-card"
                *ngFor="let item of objectTypes; trackBy: trackByCategoryId"
                tabindex="0"
                role="button"
                (click)="openCategory(item)"
                (keydown.enter)="openCategory(item)"
                (keydown.space)="openCategory(item); $event.preventDefault()">
                <div class="card-image-shell">
                  <img
                    [src]="item.imageSrc"
                    [alt]="item.imageAlt"
                    class="card-image"
                    loading="lazy" />
                </div>

                <mat-card-content class="card-content">
                  <div class="card-header-row">
                    <h3>{{ item.title }}</h3>
                    <span *ngIf="categoryCountsLoaded" class="card-tag">{{ formatCategoryListingCount(item) }}</span>
                  </div>
                  <p class="card-description">{{ item.description }}</p>
                </mat-card-content>
              </mat-card>
            </div>
          </section>
        </div>
      </ng-container>

      <ng-template #categoryView>
        <app-market-category-view
          [category]="selectedCategory"
          [materialCategories]="materialGroups"
          [objectCategories]="objectTypes"
          [loading]="isCategoryLoading"
          [loadError]="categoryLoadError"
          (categorySelect)="openCategory($event)"
          (back)="closeCategory()"></app-market-category-view>
      </ng-template>
    </div>
  </div>
</main>
