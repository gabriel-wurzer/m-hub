<div class="button-container">

    <mat-spinner *ngIf="isLoading" [diameter]="32" [strokeWidth]="3" class="loading-spinner" />
    
    <button 
        *ngIf="!isLoading"
        mat-stroked-button
        type="button"
        class="add-button"
        (click)="onButtonClick()">
        <mat-icon>{{ isAdded ? 'edit' : 'add' }}</mat-icon>
        {{ isAdded ? 'Gebäude bearbeiten' : 'Gebäude hinzufügen' }}
    </button>
</div>
