<mat-sidenav-container class="menu-container">
  <mat-sidenav *ngIf="!isMobile" mode="side" opened class="sidenav">
    
    <!-- Logo Section -->
    <div class="logo-section">
      <img [src]="logo" alt="Project logo" class="logo" />
    </div>

    <div class="name-section">
      <p>M</p>
      <p>H</p>
      <p>U</p>
      <p>B</p>
    </div>

    <!-- Navigation Buttons -->
    <div class="nav-buttons">
      <button mat-icon-button matTooltip="Karte" matTooltipPosition="after" matTooltipShowDelay="500" (click)="onMenuClick('karte')" [ngClass]="{'active': currentRoute.includes('/karte')}">
        <mat-icon>map</mat-icon>
      </button>
      <button mat-icon-button matTooltip="Markt" matTooltipPosition="after" matTooltipShowDelay="500" (click)="onMenuClick('markt')" [ngClass]="{'active': currentRoute.includes('/markt')}">
        <!-- <mat-icon>hub</mat-icon> -->
        <mat-icon>shopping_cart</mat-icon>
      </button>
      <button 
        mat-icon-button 
        [disableRipple]="!(user$ | async)"
        [matTooltip]="(user$ | async) ? 'Bestandsverwaltung' : 'Bestandsverwaltung: \nAnmeldung erforderlich'"
        matTooltipClass="multiline-tooltip"
        matTooltipPosition="after" 
        matTooltipShowDelay="500" 
        (click)="onMenuClick('bestandsverwaltung')" 
        [ngClass]="{
          'active': currentRoute.includes('/bestandsverwaltung'), 
          'disabled-state': !(user$ | async)
        }">
        <!-- <mat-icon>grid_view</mat-icon> -->
        <mat-icon>domain</mat-icon>
      </button>
    </div>

    <div class="bottom-section">
      <mat-divider />

      <ng-container *ngIf="user$ | async as user; else loginButton">
    
        <button 
          mat-icon-button 
          matTooltip="Abmelden" 
          matTooltipPosition="after" 
          disableRipple 
          class="logout-button" 
          (click)="onLogoutClick()">
          <mat-icon color="warn">logout</mat-icon>
        </button>

        <button mat-icon-button matTooltip="Profil anzeigen" matTooltipPosition="after" disableRipple class="profile-button" (click)="onProfileClick(user)">
          <mat-icon>account_circle</mat-icon>
        </button>

      </ng-container>

      <ng-template #loginButton>
        <button 
          mat-icon-button 
          matTooltip="Anmelden"  
          matTooltipPosition="after" 
          disableRipple 
          class="login-button" 
          (click)="onLoginClick()">
          <mat-icon>login</mat-icon>
        </button>
      </ng-template>
    
    </div>

  </mat-sidenav>

  <mat-sidenav-content class="main-content">

    <mat-menu #menu="matMenu">
      <div class="menu-item" (click)="onMenuClick('karte')">
        <button mat-menu-item disableRipple >
          <mat-icon>map</mat-icon> 
        </button>
        <span>Karte</span>
      </div>

      <div class="menu-item" (click)="onMenuClick('markt')">
        <button mat-menu-item disableRipple >
          <!-- <mat-icon>hub</mat-icon>  -->
          <mat-icon>shopping_cart</mat-icon>
        </button>
        <span>Markt</span>
      </div>

      <ng-container *ngIf="{ user: user$ | async } as auth">
        <div class="menu-item"
            [class.disabled-state]="!auth.user"
            (click)="auth.user ? onMenuClick('bestandsverwaltung') : onDisabledDataClick()">
            
          <button mat-menu-item disableRipple>
            <mat-icon>grid_view</mat-icon> 
          </button>
          <span>Daten</span>
        </div>
      </ng-container>

      <div class="menu-item" *ngIf="user$ | async as user" (click)="onProfileClick(user)">
        <button mat-menu-item disableRipple >
          <mat-icon>account_circle</mat-icon>
        </button>
        <span>Profil</span>
      </div>
    </mat-menu>

    <mat-toolbar *ngIf="isMobile" class="mobile-toolbar">
      <button mat-icon-button [matMenuTriggerFor]="menu"><mat-icon>menu</mat-icon></button>
      <div class="logo-section-mobile">
        <img [src]="logo" alt="Project logo" class="logo" />
      </div>
      <div class="name-section-mobile">
        <span>M HUB</span>
      </div>

      <ng-container *ngIf="user$ | async as user; else loginButton">
    
        <button 
          mat-icon-button 
          matTooltip="Abmelden" 
          matTooltipPosition="after" 
          disableRipple 
          class="logout-button" 
          (click)="onLogoutClick()">
          <mat-icon color="warn">logout</mat-icon>
        </button>

      </ng-container>

      <ng-template #loginButton>
        <button 
          mat-icon-button 
          matTooltip="Anmelden"  
          matTooltipPosition="after" 
          disableRipple 
          class="login-button" 
          (click)="onLoginClick()">
          <mat-icon>login</mat-icon>
        </button>
      </ng-template>

    </mat-toolbar>

    <div class="router-outlet-container">
      <router-outlet />
    </div>

    <footer class="page-footer" aria-label="Rechtliche Links">
      <a routerLink="/impressum">Impressum</a>
      <span aria-hidden="true">|</span>
      <a routerLink="/datenschutz">Datenschutzerklärung</a>
    </footer>
  </mat-sidenav-content>
</mat-sidenav-container>
