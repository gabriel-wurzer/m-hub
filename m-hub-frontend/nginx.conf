server {
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 220m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # SPA routing: serve index.html for unknown paths so Angular handles them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API (node-red) - m-hub-backend:1880 is reachable via docker DNS.
    location /api/ {
        proxy_pass http://m-hub-backend:1880/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Geocoder proxy (node-red route that fronts Nominatim).
    location /nominatim {
        proxy_pass http://m-hub-backend:1880/nominatim;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Postgis API (serves MVT tiles). Target root '/' strips the /postgis prefix.
    location /postgis/ {
        proxy_pass http://m-hub-postgis-api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SeaweedFS filer (serves stored files/images). Target root '/' strips the /files prefix.
    location ^~ /files/ {
        proxy_pass http://seaweed-filer:8888/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Resumable big-file upload (tus) -> m-hub-upload. Stream, don't buffer, own
    # (unbounded) body size so the 220m cap above does not apply here. Matches
    # both /upload (create) and /upload/<id> (chunks).
    location ^~ /upload {
        proxy_pass http://m-hub-upload:3300;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        client_max_body_size 0;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_set_header Host              $host;
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Let browsers cache hashed Angular bundles aggressively.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
